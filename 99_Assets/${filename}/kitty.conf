# --- Shell Configuration ---
# 確実にzshを起動させる
shell /bin/zsh

# --- Font Settings ---
# OSCPでは長時間画面を見るため、視認性の高いフォントを推奨
# (JetBrains Mono 等がインストールされていれば)
font_family      JetBrainsMono Nerd Font
font_size        11.0
bold_font        auto
italic_font      auto
bold_italic_font auto

# --- Window Layout ---
# 画面の余白（少し空けると見やすくなります）
window_padding_width 5
# タブバーを上部に表示
tab_bar_edge top
tab_bar_style powerline

# --- Color Scheme ---
# 視認性の高いダークテーマ
# background_opacity 0.92
# background            #1e1e1e
# foreground            #c5c8c6

# ここでは目に優しい Gruvbox 系の色味を推奨
foreground            #ebdbb2
background            #282828
selection_foreground  #282828
selection_background  #ebdbb2

# --- Scrollback ---
# tmux側でも設定していますが、kitty側でも多めに確保
scrollback_lines 20000

# --- Terminal Bell ---
# うるさいベル音をオフにする
enable_audio_bell no
visual_bell_duration 0.0

# --- Performance ---
# 入力遅延を最小限に
input_delay 3
repaint_delay 10
sync_to_monitor yes

# --- Keybindings ---
# 選択しただけでクリップボードにコピーする(Tmuxにマウス制御を奪われる可能性あり。その場合Shiftキーを押しながら実施)
copy_on_select yes

# クリップボードとの同期
strip_trailing_spaces smart

# 右クリックで貼り付け（お好みで）
# これを入れると、選択（左ドラッグ）→ 貼り付け（右クリック）で爆速になります
mouse_map right click ungrabbed paste_from_clipboard

# 矩形選択（ブロック選択）を Alt + マウスドラッグ で可能にする
# IPアドレスの列だけを抜き出したい時などに便利です
terminal_select_modifiers alt